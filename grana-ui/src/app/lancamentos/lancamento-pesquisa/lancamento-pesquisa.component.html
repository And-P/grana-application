<div class="container addMarginDown">
  
    <div class="grid">

      <form autocomplete="off" (ngSubmit)="pesquisar()">
    
          <div class="col-12 p-fluid">
            <h1>Lançamentos</h1>
          </div>
      
          <div class="col-12 p-fluid">
            <label>Descrição</label>
            <input pInputText
                   name="descricao" 
                   type="text" 
                   [(ngModel)]="filtro.descricao">
          </div>
      
          <div class="col-12">
            <label class="block">Vencimento</label>
            <p-calendar 
                      name="dataVencimentoInicio"
                      dateFormat="dd.mm.yyyy" 
                      [inputStyle]="{ width: '145px'}"
                      [inline]="false" 
                      [readonlyInput]="false"
                      [showIcon]="true"
                      [(ngModel)]="filtro.dataVencimentoInicio"
                      >
            </p-calendar>
      
            <label class="label">até</label>
            <p-calendar 
                      name="dataVencimentoFim"
                      dateFormat="dd.mm.yyyy" 
                      [inputStyle]="{ width: '145px'}"
                      [inline]="false" 
                      [readonlyInput]="false"
                      [showIcon]="true"
                      [(ngModel)]="filtro.dataVencimentoFim"
                      >
            </p-calendar>
          </div>
      
          <div class="col-12">
            <button pButton 
                    label="Pesquisar"
                    icon="pi pi-search" 
                    class="p-button-secondary" 
                    type="submit" 
                    >
            </button>
          </div>

        </form>
    </div>
    
    
    <div class="col-12">

        <p-table [value]="lancamentos" 
                 [paginator]="true" 
                 [rows]="filtro.itensPorPagina" 
                 [responsive]="true"
                 [lazy]="true"
                 [totalRecords]="totalRegistros"
                 (onLazyLoad)="mudaPagina($event)"
                 emptyMessage="Nenhum lançamento encontrado"
                 #tabela>
            
            <ng-template pTemplate="header">
                <tr>
                    <th>Pessoa</th>
                    <th>Descrição</th>
                    <th class="col-data-header">Vencimento</th>
                    <th class="col-data-header">Pagamento</th>
                    <th class="col-valor-header">Valor</th>
                    <th class="col-acoes-header"></th>

                </tr>
            </ng-template>
            
            <ng-template pTemplate="body" let-lancamento>
                <tr>
                    <td><span class="p-column-title">Pessoa</span>{{ lancamento.pessoa }}</td>
                    <td><span class="p-column-title">Descrição</span>{{ lancamento.descricao }}</td>
                    <td class="col-data-content"><span class="p-column-title">Vencimento</span>{{ lancamento.dataVencimento }}</td>
                    <td class="col-data-content"><span class="p-column-title">Pagamento</span>{{ lancamento.dataPagamento }}</td>
                    <td class="col-valor-content">
                      <span class="p-column-title">Valor</span>
                      <span [ngStyle]="{ color: lancamento.tipo === 'DESPESA' ? 'red' : 'gray'}">{{lancamento.valor | number:'1.2-2':'pt-BR'}}</span>
                    </td>
                    <td class="col-acoes-content">
                      <a pButton 
                         icon="pi pi-pencil" 
                         class="p-button-secondary" 
                         pTooltip="Editar" 
                         tooltipPosition="top"></a>
                      <button pButton 
                              icon="pi pi-trash" 
                              class="p-button-danger" 
                              pTooltip="Excluir" 
                              tooltipPosition="top"
                              (click)="confirmarExclusao(lancamento)"></button>
                    </td>  
                </tr>
            </ng-template>
        
            <ng-template pTemplate="emptymessage">
              <tr>
                <td colspan="6">
                  Nenhum lançamento encontrado
                </td>
              </tr>
            </ng-template>
        </p-table>   
    </div>
  
    <div class="flex flex-row-reverse">
      <div>
        <a pButton icon="pi pi-plus" class="p-button-help" label="Lançamento" pTooltip="Adicionar Lançamento" tooltipPosition="top"></a>
      </div>
    </div>
  
  </div>
