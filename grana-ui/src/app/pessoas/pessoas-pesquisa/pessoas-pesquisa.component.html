<div class="container addMarginDown">
  
    <div class="grid">
      
      <form autocomplete="off" (ngSubmit)="pesquisar()">
            <div class="col-12">
              <h1>Pessoas</h1>
            </div>
          
            <div class="col-12 p-fluid">
              <label>Nome</label>
              <input pInputText
                     name="nome"
                     type="text"
                     [(ngModel)]="filtro.nome">
            </div>
          
            <div class="col-12">
              <button pButton 
                      label="Pesquisar"
                      icon="pi pi-search" 
                      class="p-button-secondary" 
                      type="submit">
              </button>
            </div>
      </form>
    </div>
  
    <div class="grid">
      <div class="col-12">

        <p-table [value]="pessoas" 
                 [responsive]="true"
                 [paginator]="true"
                 [rows]="filtro.itensPorPagina" 
                 [lazy]="true"
                 [totalRecords]="totalRegistros"
                 (onLazyLoad)="mudaPagina($event)"
                 emptyMessage="Nenhum lançamento encontrado"
                 #tabela>

            <ng-template pTemplate="header">
                <tr>
                    <th class="col-data-header">Nome</th>
                    <th class="col-data-header">Cidade</th>
                    <th class="col-data-header">Estado</th>
                    <th class="col-data-header">Status</th>
                    <th class="col-data-header"></th>
                </tr>
            </ng-template> 

            <ng-template pTemplate="body" let-pessoa>
                <tr>
                    <td><span class="p-column-title">Nome</span>{{ pessoa.nome }}</td>
                    <td><span class="p-column-title">Cidade</span>{{ pessoa.endereco.cidade }}</td>
                    <td class="col-data-content"><span class="p-column-title">Estado</span>{{ pessoa.endereco.estado }}</td>
                    <td class="col-data-content">
                        <span class="p-column-title" >Status</span>
                        <a href="javascript:;" 
                           [pTooltip]=" pessoa.ativo ? 'Desativar' : 'Ativar' " 
                           tooltipPosition="top"
                           (click)="mudarStatus(pessoa)">
                            {{ pessoa.ativo ? 'Ativo' : 'Inativo' }}
                        </a>    
                    </td>
                    <td class="col-acoes">
                      <span class="p-column-title"></span>
                      <a pButton 
                         icon="pi pi-pencil" 
                         class="p-button-secondary" 
                         pTooltip="Editar" 
                         tooltipPosition="top"></a>
                      <button pButton 
                              icon="pi pi-trash" 
                              class="p-button-danger" 
                              pTooltip="Excluir" 
                              tooltipPosition="top"
                              (click)="confirmarExclusao(pessoa)"></button>
                    </td>  
                </tr>
            </ng-template>       

            <ng-template pTemplate="emptymessage">
              <tr>
                <td colspan="5">
                  Nenhuma pessoa encontrada
                </td>
              </tr>
            </ng-template>
        </p-table>

      </div>
    </div>  

    <div class="flex flex-row-reverse">
      <div>
        <a pButton icon="pi pi-plus" class="p-button-help" label="Pessoa" pTooltip="Adicionar Pessoa" tooltipPosition="top"></a>
      </div>
    </div>
  
</div>
